services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    ports:
      - "8096:8096"
    volumes:
      - ${SRV_DIR}/docker/appdata/jellyfin/config:/config
      - ${SRV_DIR}/docker/appdata/jellyfin/cache:/cache
      - ${SRV_DIR}/media:/media
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "8989:8989"
    volumes:
      - ${SRV_DIR}/docker/appdata/sonarr/config:/config
      - ${SRV_DIR}/media/shows:/shows
      - ${SRV_DIR}/torrents/complete:/downloads
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "7878:7878"
    volumes:
      - ${SRV_DIR}/docker/appdata/radarr/config:/config
      - ${SRV_DIR}/media/movies:/movies
      - ${SRV_DIR}/torrents/complete:/downloads
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    ports:
      - "9696:9696"
    volumes:
      - ${SRV_DIR}/docker/appdata/prowlarr/config:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    ports:
      - "8080:8080"
      - "6881:6881"
    volumes:
      - ${SRV_DIR}/docker/appdata/qbittorrent/config:/config
      - ${SRV_DIR}/torrents:/downloads
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    ports:
      - "6767:6767"
    volumes:
      - ${SRV_DIR}/docker/appdata/bazarr/config:/config
      - ${SRV_DIR}/media/movies:/movies
      - ${SRV_DIR}/media/shows:/shows
    restart: unless-stopped

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    ports:
      - "5055:5055"
    volumes:
      - ${SRV_DIR}/docker/appdata/overseerr/config:/config
    restart: unless-stopped
