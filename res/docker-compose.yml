services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${JELLYFIN_PGID}
    ports:
      - "8096:8096"
    volumes:
      - ${SRV_DIR}/docker/appdata/jellyfin/config:/config
      - ${SRV_DIR}/docker/appdata/jellyfin/cache:/cache
      - ${SRV_DIR}/media:/media
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
