services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: jellyfin-node
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${SRV_DIR}/docker/appdata/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    command: >
      sh -c "
        tailscale up --authkey=${TS_AUTHKEY} &&
        tailscale serve 8096 localhost:8096
      "
    restart: unless-stopped
  
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    user: "${PUID}:${JELLYFIN_PGID}"
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${SRV_DIR}/docker/appdata/jellyfin/config:/config
      - ${SRV_DIR}/docker/appdata/jellyfin/cache:/cache
      - ${SRV_DIR}/media:/media:ro
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped